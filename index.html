<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexlink Studio - Elevate Your Brand</title>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This ensures fetch is configurable/writable if a library tries to polyfill it.
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return window.__fetchPolyfill || originalFetch;
            },
            set: function(v) {
              window.__fetchPolyfill = v;
            }
          });
        } catch (e) {
          console.warn('Nexlink: Could not redefine fetch', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
